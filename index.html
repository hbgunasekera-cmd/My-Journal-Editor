<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Journal Console</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@0.473.0/dist/umd/lucide.min.js"></script>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB7OkvfJ1fOwtOY5jw4r2_GK0O7qvUVuPs&libraries=places"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .leaflet-container { background: #f8fafc; font-family: inherit; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Configuration ---
        const VALID_CATEGORIES = ["Waterfall", "Mountain", "Trail", "Viewpoint", "Beach", "Park", "Plateaus", "Reserved Forest", "Monastery", "Archaeology", "Reservoir", "Pool", "Stream", "Location"];
        
        // Supabase Initialization
        const supabaseUrl = 'https://xyzcompany.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        function App() {
            // --- States ---
            const [currentTab, setCurrentTab] = useState('locations'); // 'locations', 'routes', 'audit'
            const [places, setPlaces] = useState([]);
            const [newLocationCategory, setNewLocationCategory] = useState("Location");
            const [tempLocation, setTempLocation] = useState(null);
            const [toast, setToast] = useState({ show: false, msg: "" });

            // --- Refs ---
            const autocompleteRef = useRef(null);
            const mapRef = useRef(null);
            const markersLayer = useRef(L.layerGroup());

            // --- Notifications ---
            const showToast = (msg) => {
                setToast({ show: true, msg });
                setTimeout(() => setToast({ show: false, msg: "" }), 3000);
            };

            // --- Data Fetching ---
            const fetchPlaces = async () => {
                const { data, error } = await supabaseClient
                    .from('travel_bucket_list')
                    .select('*')
                    .order('created_at', { ascending: false });
                if (!error) setPlaces(data);
            };

            // --- Actions ---
            const handleLocationSubmit = async (e) => {
                if (e) e.preventDefault();
                if (!tempLocation) return showToast("Select a location first!");

                const { error } = await supabaseClient.from('travel_bucket_list').insert([{
                    place_name: tempLocation.place_name,
                    district: tempLocation.district,
                    latitude: tempLocation.latitude,
                    longitude: tempLocation.longitude,
                    category: newLocationCategory,
                    image_url: tempLocation.image_url
                }]);

                if (!error) {
                    showToast("Successfully Saved!");
                    setTempLocation(null);
                    if (autocompleteRef.current) autocompleteRef.current.value = "";
                    fetchPlaces();
                } else {
                    showToast("Error saving data");
                }
            };

            const handleDelete = async (id) => {
                if (!confirm("Are you sure you want to delete this entry?")) return;
                const { error } = await supabaseClient.from('travel_bucket_list').delete().eq('id', id);
                if (!error) {
                    showToast("Deleted");
                    fetchPlaces();
                }
            };

            // --- Google Autocomplete Initialization ---
            const initGoogle = () => {
    // Safety Check: If the script hasn't loaded yet, stop and wait
    if (typeof google === 'undefined' || !google.maps || !google.maps.places) {
        console.log("Waiting for Google Maps API...");
        return;
    }

    if (!autocompleteRef.current) return;

    const autocomplete = new google.maps.places.Autocomplete(autocompleteRef.current);
    autocomplete.addListener('place_changed', () => {
        const place = autocomplete.getPlace();
        if (!place.geometry) return;

        const district = place.address_components?.find(c => c.types.includes('administrative_area_level_2'))?.long_name || "Unknown";
        
        setTempLocation({
            place_name: place.name,
            district: district,
            latitude: place.geometry.location.lat(),
            longitude: place.geometry.location.lng(),
            image_url: place.photos ? place.photos[0].getUrl() : ""
        });
    });
};

            // --- Leaflet Map Initialization ---
            const initMap = () => {
                if (mapRef.current || !document.getElementById('map-container')) return;
                
                mapRef.current = L.map('map-container', { zoomControl: false, attributionControl: false }).setView([7.8731, 80.7718], 7);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapRef.current);
                markersLayer.current.addTo(mapRef.current);
                
                // Add existing markers
                places.forEach(p => {
                    L.circleMarker([p.latitude, p.longitude], {
                        radius: 5,
                        fillColor: "#4f46e5",
                        color: "#fff",
                        weight: 2,
                        opacity: 1,
                        fillOpacity: 0.8
                    }).addTo(markersLayer.current).bindPopup(`<span class="text-[10px] font-bold uppercase">${p.place_name}</span>`);
                });
            };

            // --- Lifecycle Effects ---
            useEffect(() => { fetchPlaces(); }, []);
            
            useEffect(() => {
                if (currentTab === 'locations') initGoogle();
                if (currentTab === 'routes') setTimeout(initMap, 150);
                lucide.createIcons();
            }, [currentTab, places]);

            return (
                <div className="min-h-screen pb-24 md:pb-8">
                    {/* Header */}
                    <header className="sticky top-0 z-[1000] bg-white/80 backdrop-blur-xl border-b border-slate-100 px-6 py-4">
                        <div className="max-w-7xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white shadow-lg">
                                    <i data-lucide="database" className="w-5 h-5"></i>
                                </div>
                                <div>
                                    <h1 className="text-sm font-black uppercase tracking-tighter">Journal Console</h1>
                                    <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Back-End System</p>
                                </div>
                            </div>
                            
                            <nav className="hidden md:flex items-center gap-1 bg-slate-100 p-1 rounded-xl">
                                {['locations', 'routes', 'audit'].map(tab => (
                                    <button 
                                        key={tab}
                                        onClick={() => setCurrentTab(tab)}
                                        className={`px-6 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all ${currentTab === tab ? 'bg-white shadow-sm text-slate-900' : 'text-slate-400 hover:text-slate-600'}`}
                                    >
                                        {tab}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto p-4 lg:p-8">
                        {/* 1. LOCATIONS PAGE */}
                        {currentTab === 'locations' && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                                {/* Add Form */}
                                <div className="lg:col-span-4">
                                    <div className="lg:sticky lg:top-28 bg-white p-6 rounded-[32px] shadow-sm border border-slate-100">
                                        <h2 className="text-[10px] font-black uppercase tracking-widest mb-6 flex items-center gap-2 text-indigo-600">
                                            <i data-lucide="plus-circle" className="w-4 h-4"></i> New Entry
                                        </h2>
                                        <form onSubmit={handleLocationSubmit} className="space-y-4">
                                            <input 
                                                ref={autocompleteRef}
                                                type="text" 
                                                placeholder="Search via Google Maps..." 
                                                className="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none text-xs font-bold focus:ring-2 focus:ring-indigo-500 transition-all" 
                                            />
                                            <select 
                                                value={newLocationCategory}
                                                onChange={(e) => setNewLocationCategory(e.target.value)}
                                                className="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none text-xs font-bold appearance-none cursor-pointer"
                                            >
                                                {VALID_CATEGORIES.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                            </select>
                                            <button type="submit" className="w-full bg-slate-900 text-white py-4 rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] shadow-lg hover:bg-indigo-600 transition-all">
                                                Save to Database
                                            </button>
                                        </form>
                                    </div>
                                </div>

                                {/* List Cards */}
                                <div className="lg:col-span-8 grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {places.map(p => (
                                        <div key={p.id} className="bg-white p-3 rounded-[28px] border border-slate-100 shadow-sm flex gap-4 group hover:shadow-xl transition-all duration-500">
                                            <div className="w-24 h-24 rounded-[20px] overflow-hidden bg-slate-100 shrink-0 relative">
                                                <img src={p.image_url || 'https://via.placeholder.com/150'} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                                                <div className="absolute top-2 left-2 bg-white/90 backdrop-blur-md px-2 py-1 rounded-lg text-[7px] font-black uppercase text-slate-900">{p.category}</div>
                                            </div>
                                            <div className="flex-1 min-w-0 flex flex-col justify-center">
                                                <h3 className="text-[11px] font-black uppercase truncate text-slate-900 mb-1">{p.place_name}</h3>
                                                <div className="flex items-center gap-1.5 text-slate-400 mb-3">
                                                    <i data-lucide="map-pin" className="w-3 h-3 text-orange-500"></i>
                                                    <span className="text-[9px] font-bold uppercase tracking-widest">{p.district}</span>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => window.open(`https://www.google.com/maps?q=${p.latitude},${p.longitude}`)} className="p-2 bg-slate-50 rounded-xl text-slate-400 hover:text-indigo-600 transition-colors">
                                                        <i data-lucide="external-link" className="w-3.5 h-3.5"></i>
                                                    </button>
                                                    <button onClick={() => handleDelete(p.id)} className="p-2 bg-slate-50 rounded-xl text-slate-400 hover:text-red-500 transition-colors">
                                                        <i data-lucide="trash-2" className="w-3.5 h-3.5"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* 2. ROUTES PAGE */}
                        {currentTab === 'routes' && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 h-[calc(100vh-220px)]">
                                <div className="lg:col-span-8 bg-white p-2 rounded-[32px] shadow-sm border border-slate-100 overflow-hidden relative">
                                    <div id="map-container" className="w-full h-full rounded-[24px] z-0"></div>
                                </div>
                                <div className="lg:col-span-4 bg-white p-6 rounded-[32px] shadow-sm border border-slate-100 overflow-y-auto custom-scrollbar">
                                    <h2 className="text-[10px] font-black uppercase tracking-widest mb-6 text-orange-500">Saved Itineraries</h2>
                                    <div className="space-y-3">
                                        <div className="text-center py-10 opacity-20">
                                            <i data-lucide="route" className="w-8 h-8 mx-auto mb-2"></i>
                                            <p className="text-[10px] font-bold uppercase">No active routes</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 3. AUDIT PAGE */}
                        {currentTab === 'audit' && (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                <div className="bg-slate-900 text-white p-8 rounded-[40px] shadow-2xl">
                                    <h2 className="text-[10px] font-black uppercase tracking-[0.3em] mb-8 text-indigo-400">Database Core Status</h2>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="p-6 bg-white/5 rounded-3xl border border-white/10">
                                            <p className="text-[9px] font-bold opacity-40 uppercase mb-1">Total Nodes</p>
                                            <p className="text-4xl font-black">{places.length}</p>
                                        </div>
                                        <div className="p-6 bg-white/5 rounded-3xl border border-white/10">
                                            <p className="text-[9px] font-bold opacity-40 uppercase mb-1">Districts</p>
                                            <p className="text-4xl font-black">{new Set(places.map(p => p.district)).size}</p>
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-white p-8 rounded-[40px] border border-slate-100">
                                    <h2 className="text-[10px] font-black uppercase tracking-[0.2em] mb-8 text-slate-400">System Suggestions</h2>
                                    <div className="space-y-4">
                                        {places.filter(p => !p.image_url).map(p => (
                                            <div key={p.id} className="flex items-center justify-between p-4 bg-orange-50 rounded-2xl border border-orange-100">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-8 h-8 bg-orange-200 rounded-full flex items-center justify-center text-orange-600"><i data-lucide="image" className="w-4 h-4"></i></div>
                                                    <div>
                                                        <p className="text-[10px] font-black uppercase">{p.place_name}</p>
                                                        <p className="text-[8px] font-bold text-orange-400 uppercase">Missing Cover Image</p>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Mobile Navigation Dock */}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 md:hidden z-[2000] flex bg-slate-900/90 backdrop-blur-xl p-2 rounded-full shadow-2xl border border-white/10">
                        {['locations', 'routes', 'audit'].map(tab => (
                            <button 
                                key={tab}
                                onClick={() => setCurrentTab(tab)}
                                className={`p-4 rounded-full transition-all ${currentTab === tab ? 'bg-white text-slate-900' : 'text-white/50'}`}
                            >
                                <i data-lucide={tab === 'locations' ? 'map-pin' : tab === 'routes' ? 'route' : 'shield-check'} className="w-5 h-5"></i>
                            </button>
                        ))}
                    </nav>

                    {/* Toast Notification */}
                    {toast.show && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[5000] bg-slate-900 text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest animate-bounce shadow-2xl">
                            {toast.msg}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
