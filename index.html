        const SUPABASE_URL = 'https://vpslgikpaintiuayajmx.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_rsbN_QlROV14EEzYjl9dTQ_Jxl-ra44';
        
        const HomePoint = { lat: 7.0911, lng: 79.9161 };
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);        
        const VALID_CATEGORIES = ["Waterfall", "Mountain", "Trail", "Viewpoint", "Beach", "Park", "Plateaus", "Reserved Forest", "Monastery", "Archaeology", "Reservoir", "Pool", "Stream", "Location"];
        
        function App() {

// --- Core Data States ---
const [places, setPlaces] = useState([]);
const [visiblePlaces, setVisiblePlaces] = useState([]);
const [filteredPlaces, setFilteredPlaces] = useState([]);

const [manualHome, setManualHome] = React.useState(null);

// --- UI & Interaction States ---
const [activeTab, setActiveTab] = useState('places');
const [selectedTrip, setSelectedTrip] = useState([]);
const [searchTerm, setSearchTerm] = useState('');
const [filterCategory, setFilterCategory] = useState('All');
const [filterStatus, setFilterStatus] = useState('All');
const [sortBy, setSortBy] = useState('newest');

// --- Add Location Flow State ---

// --- Refs ---
const mapRef = useRef(null);
const lastRoutePoints = useRef("");
const markersLayer = useRef(L.layerGroup());
const routingControl = React.useRef(null);
const autocompleteRef = useRef(null);

const [qrUrl, setQrUrl] = React.useState('');

// --- 1. ICON SYSTEM ---
const Icon = ({ name, className = "w-4 h-4" }) => {
    const iconRef = React.useRef(null);
    React.useLayoutEffect(() => {
        if (window.lucide && iconRef.current) {
            window.lucide.createIcons({ nodes: [iconRef.current] });
        }
    }, [name]);
    return <i ref={iconRef} data-lucide={name} className={className}></i>;
};

// Global Lucide refresh for dynamic content
React.useEffect(() => {
    const timer = setTimeout(() => {
        if (window.lucide) window.lucide.createIcons();
    }, 100);
    return () => clearTimeout(timer);
}, [activeTab, selectedTrip, searchTerm, filteredPlaces]);


// --- 2. GPS & DATA INITIALIZATION ---
React.useEffect(() => {
    refreshAllData();
    initGoogle();

    if (navigator.geolocation) {
        const watchId = navigator.geolocation.watchPosition(
            (pos) => setUserCoords({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
            (err) => console.error("GPS Error:", err),
            { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
        );
        return () => navigator.geolocation.clearWatch(watchId);
    }
}, []);


// --- 3. STEADY ROUTING EFFECT (No More Blinking) ---
React.useEffect(() => {
    if (!mapRef.current || activeTab !== 'map') return;

    // Helper: Distance Calculator for Throttling
    const getDistance = (c1, c2) => {
        if (!c1 || !c2) return 999;
        const R = 6371e3;
        const dLat = (c2.lat - c1.lat) * Math.PI / 180;
        const dLon = (c2.lng - c1.lng) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(c1.lat * Math.PI/180) * Math.cos(c2.lat * Math.PI/180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    };

    const start = manualHome ? HomePoint : (userCoords ? L.latLng(userCoords.lat, userCoords.lng) : HomePoint);
    const newWaypoints = [
        start,
        ...selectedTrip.map(p => L.latLng(parseFloat(p.latitude), parseFloat(p.longitude)))
    ];

    // Handle Route Removal
    if (selectedTrip.length === 0) {
        if (routingControl.current) {
            mapRef.current.removeControl(routingControl.current);
            routingControl.current = null;
        }
        return;
    }

    // STEADY UPDATE LOGIC
    if (routingControl.current) {
        const distanceMoved = getDistance(lastDrawnCoords.current, start);
        const tripChanged = lastRoutePoints.current !== JSON.stringify(selectedTrip);

        if (distanceMoved > 10 || tripChanged) {
            routingControl.current.setWaypoints(newWaypoints);
            lastDrawnCoords.current = start;
            lastRoutePoints.current = JSON.stringify(selectedTrip);
        }
    } else if (newWaypoints.length >= 2) {
        routingControl.current = L.Routing.control({
            waypoints: newWaypoints,
            router: L.Routing.osrmv1({
                serviceUrl: 'https://routing.openstreetmap.de/routed-car/route/v1',
                profile: 'driving'
            }),
            lineOptions: { styles: [{ color: '#ef4444', weight: 6, opacity: 0.85 }], addWaypoints: false },
            createMarker: () => null,
            addWaypoints: false,
            show: false 
        }).addTo(mapRef.current);
        
        lastDrawnCoords.current = start;
        lastRoutePoints.current = JSON.stringify(selectedTrip);
    }
}, [selectedTrip, userCoords, manualHome, activeTab]);


// --- 4. MARKER MANAGER EFFECT ---
React.useEffect(() => {
    if (!mapRef.current || activeTab !== 'map') return;

    // Disappearing Map Fix (Container Resize)
    const resizeTimer = setTimeout(() => mapRef.current.invalidateSize(), 300);

    markersLayer.current.clearLayers();
    if (!mapRef.current.hasLayer(markersLayer.current)) {
        markersLayer.current.addTo(mapRef.current);
    }

    const addDot = (lat, lng, color, title, subtitle) => {
    const pLat = parseFloat(lat);
    const pLng = parseFloat(lng);
    if (isNaN(pLat) || isNaN(pLng)) return;

    const marker = L.circleMarker([pLat, pLng], {
        radius: 7, // Slightly larger hit area for easier hover
        fillColor: color,
        color: '#fff',
        weight: 2,
        opacity: 1,
        fillOpacity: 0.9
    });

    // HOVER TOOLTIP: Shows the name immediately on hover
    marker.bindTooltip(title, {
        permanent: false,   // Show only on hover
        direction: 'top',   // Appear above the dot
        sticky: true,       // Follow the mouse cursor
        className: 'custom-map-tooltip',
        offset: [0, -5]     // Small gap so it doesn't touch the dot
    });

    // CLICK POPUP: Shows the category/subtitle when clicked
    marker.bindPopup(`
        <div style="padding: 4px;">
            <b style="font-size: 11px; color: ${color};">${title}</b><br/>
            <span style="font-size: 9px; color: #666;">${subtitle}</span>
        </div>
    `);

    marker.addTo(markersLayer.current);
};

    places.forEach(p => {
        const color = p.status === 'done' ? '#22c55e' : '#f97316';
        addDot(p.latitude, p.longitude, color, p.place_name || 'Destination', p.category || 'Bucket List');
    });

    savedRoutes.forEach(route => {
        try {
            const pts = typeof route.waypoints === 'string' ? JSON.parse(route.waypoints) : route.waypoints;
            pts?.forEach(pt => addDot(pt.lt, pt.ln, '#a855f7', pt.n || 'Stop', 'Route Point'));
        } catch (e) {}
    });

    return () => clearTimeout(resizeTimer);
}, [mapReady, places, savedRoutes, activeTab]);


// --- 5. SEARCH & FILTER LOGIC ---
React.useEffect(() => {
    if (!searchTerm) {
        setFilteredPlaces(places);
        return;
    }
    const lowSearch = searchTerm.toLowerCase();
    const filtered = places.filter(p => {
        const name = p?.place_name ? String(p.place_name).toLowerCase() : "";
        const cat = p?.category ? String(p.category).toLowerCase() : "";
        return name.includes(lowSearch) || cat.includes(lowSearch);
    });
    setFilteredPlaces(filtered);
}, [searchTerm, places]);


            const triggerToast = (msg) => {
                setToast({ show: true, msg });
                setTimeout(() => setToast({ show: false, msg: '' }), 2500);
            };

            const refreshAllData = async () => {
    const [p, sr, v, a, c, l] = await Promise.all([
        supabaseClient.from('travel_bucket_list').select('*').order('created_at', { ascending: false }),
        supabaseClient.from('saved_travel_routes').select('*').order('created_at', { ascending: false }),
        supabaseClient.from('page_visits').select('*'), // Fetch raw visits
        supabaseClient.from('pending_approvals').select('*').order('created_at', { ascending: false }),
        supabaseClient.from('location_comments').select('*, travel_bucket_list(place_name)').order('created_at', { ascending: false }), // Fetch ALL comments
        supabaseClient.from('location_likes').select('*, travel_bucket_list(place_name)')
    ]);

    setPlaces(p.data || []);
    setSavedRoutes(sr.data || []);
    setAnalyticsData(v.data || []);
    setPendingApprovals(a.data || []);
    setAllComments(c.data || []);
    setLikesData(l.data || []);
};



            // --- HEADER: ADD LOCATION FUNCTIONS ---
            const initGoogle = async () => {
                const { Autocomplete } = await google.maps.importLibrary("places");
                if (!autocompleteRef.current) return;
                const autocomplete = new Autocomplete(autocompleteRef.current, { componentRestrictions: { country: "lk" } });
                autocomplete.addListener("place_changed", () => {
                    const place = autocomplete.getPlace();
                    if (!place.geometry) return;
                    setStagedLocation({
                        place_name: place.name,
                        latitude: place.geometry.location.lat(),
                        longitude: place.geometry.location.lng(),
                        locality: place.address_components?.[0]?.long_name || "Unknown Area",
                        google_maps_url: place.url,
                        category: 'Location' // Default
                    });
                });
            };

            const saveStagedLocation = async () => {
    if (!stagedLocation) return;

    // Use live user coordinates if available; otherwise, fall back to HomePoint
    const referencePoint = userCoords || HomePoint;

    // Calculate distance in KM based on the reference point
    const dist = (L.latLng(referencePoint.lat, referencePoint.lng)
        .distanceTo(L.latLng(stagedLocation.latitude, stagedLocation.longitude)) / 1000)
        .toFixed(1);

    const { error } = await supabaseClient.from('travel_bucket_list').insert([{
        ...stagedLocation,
        status: 'pending',
        distance_km: dist
    }]);
    
    if (!error) {
        triggerToast('Location Saved Successfully');
        setStagedLocation(null);
        if (autocompleteRef.current) autocompleteRef.current.value = '';
        refreshAllData();
    } else {
        triggerToast('Error Saving Location');
        console.error("Supabase Error:", error);
    }
};

            // --- TAB 1: PLACES FUNCTIONS ---
const updatePlaceField = async (id, field, value) => {
    // 1. Prepare the update object
    const updateData = { [field]: value };

    // 2. Logic: If the field being updated is 'status', also update 'created_at'
    if (field === 'status') {
        
        updateData.created_at = new Date().toISOString();
    }

    const { error } = await supabaseClient
        .from('travel_bucket_list')
        .update(updateData)
        .eq('id', id);

    if (!error) { 
        triggerToast('Updated Successfully'); 
        refreshAllData(); 
    } else {
        triggerToast('Update Failed');

};

            const promptForValue = (id, field, currentVal, title) => {

            const processedPlaces = useMemo(() => {

    }
    // updateMapRoute() will be triggered by the state change
};
const updateMapMarkers = () => {
    if (!mapRef.current || !markersLayer.current) return;
    
    // Clear existing markers before redrawing
    markersLayer.current.clearLayers();

const calculateRouteDistance = () => {
    // 1. Identify the starting point using the same priority as the map
    let startPoint = null;

    if (manualHome) {
        startPoint = L.latLng(manualHome.lat, manualHome.lng);
    } else if (userCoords && userCoords.lat && userCoords.lng) {
        startPoint = L.latLng(parseFloat(userCoords.lat), parseFloat(userCoords.lng));
    } else {
        // Fallback to HomePoint
        startPoint = L.latLng(7.0911, 79.9161);
    }

    // 2. Safety check: If for some reason startPoint is still null, return 0
    if (!startPoint) return "0.0";

    const tripData = Array.isArray(selectedTrip[0]) ? selectedTrip[0] : selectedTrip;
    let totalDistance = 0;
    let currentPos = startPoint;

    // 3. Calculate cumulative distance
    tripData.forEach((point) => {
        if (point.latitude && point.longitude) {
            const destination = L.latLng(parseFloat(point.latitude), parseFloat(point.longitude));
            // distanceTo returns meters, so we divide by 1000 for KM
            totalDistance += currentPos.distanceTo(destination) / 1000;
            currentPos = destination;
        }
    });

    return totalDistance.toFixed(1);
};

                waypoints: JSON.stringify(selectedTrip.map(p => ({
                    lt: p.latitude,
                    ln: p.longitude,
                    n: p.place_name
                })))
            }]);

        if (error) throw error;

        
        await refreshAllData(); 
        setSelectedTrip([]); 
        
        showToast("Route saved successfully!");
    } catch (err) {
        console.error("Save error:", err);
        showToast("Failed to save route");
    }
};

                    attributionControl: false
                }).setView([HomePoint.lat, HomePoint.lng], 8);

                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                
                // Attach the layer group
                markersLayer.current.addTo(map);
                mapRef.current = map;
                
                // CRITICAL: Signal that markers can now be drawn
                setMapReady(true);
            } else {
                mapRef.current.invalidateSize();
                // Ensure markers are refreshed on tab switch
                setMapReady(prev => !prev); 
            }
        }, 150); // Increased delay for stability
        return () => clearTimeout(timer);
    } else {
        setMapReady(false);
    }
}, [activeTab]);

// --- 1. UNIVERSAL URL GENERATOR ---
const generateGoogleMapsUrl = (points) => {
    if (!points || points.length === 0) return null;

    // Use official Google Maps Directions deep-link format
    const baseUrl = "https://www.google.com/maps/dir/";
    
    const stops = points.map(p => {
        // Universal coordinate check: supports .latitude OR .lt
        const lat = p.latitude !== undefined ? p.latitude : p.lt;
        const lng = p.longitude !== undefined ? p.longitude : p.ln;
        return `${lat},${lng}`;
    }).join('/');

    return `${baseUrl}${stops}`;
};

const dashboardStats = React.useMemo(() => {
    // Safety Guards: Ensure data exists and is an array
    const safeAnalytics = Array.isArray(analyticsData) ? analyticsData : [];
    const safeLikes = Array.isArray(likesData) ? likesData : [];

    const cityVisits = {};
    const countryVisits = {};
    const deviceVisits = { Desktop: 0, Mobile: 0, Tablet: 0 };
    
    // 1. Process Page Visits Metrics
    safeAnalytics.forEach(v => {
        if (!v) return;
        
        // Aggregate Geography
        if (v.city) cityVisits[v.city] = (cityVisits[v.city] || 0) + 1;
        if (v.country) countryVisits[v.country] = (countryVisits[v.country] || 0) + 1;
        
        // Aggregate Devices
        const ua = (v.user_agent || "").toLowerCase();
        if (ua.includes('tablet') || ua.includes('ipad')) {
            deviceVisits.Tablet++;
        } else if (ua.includes('mobile') || ua.includes('android') || ua.includes('iphone')) {
            deviceVisits.Mobile++;
        } else {
            deviceVisits.Desktop++;
        }
    });

    // 2. Process Likes Summary (Location, Hits, City, Country)
    const likesMap = {};
    safeLikes.forEach(l => {
        // Use the joined travel_bucket_list table for the name
        const locName = l.travel_bucket_list?.place_name || 'Unknown Location';
        if (!likesMap[locName]) {
            likesMap[locName] = { 
                name: locName, 
                hits: 0, 
                city: l.city || 'N/A', 
                country: l.country || 'N/A' 
            };
        }
        likesMap[locName].hits += 1;
    });

    // Sort by most hits
    const likesSummary = Object.values(likesMap).sort((a, b) => b.hits - a.hits);

    return { 
        totalVisits: safeAnalytics.length,
        deviceVisits, 
        cityVisits, 
        countryVisits, 
        likesSummary 
    };
}, [analyticsData, likesData]);

// Handles Approve/Reject for Suggestion Approvals
const handleSuggestionAction = async (suggestionId, action) => {
    try {
        if (action === 'rejected') {
            // 1. DELETE FROM PENDING TABLE
            const { error: deleteError } = await supabaseClient
                .from('pending_approvals')
                .delete()
                .eq('id', suggestionId);

            if (deleteError) throw deleteError;
            triggerToast('Suggestion Removed');

        } else if (action === 'approved') {
            // 1. FETCH DATA FROM PENDING TABLE FIRST
            const { data: suggestion, error: fetchError } = await supabaseClient
                .from('pending_approvals')
                .select('*')
                .eq('id', suggestionId)
                .single();

            if (fetchError) throw fetchError;

            // 2. INSERT INTO TRAVEL_BUCKET_LIST (Mapping columns)
            const { error: insertError } = await supabaseClient
                .from('travel_bucket_list')
                .insert([{
                    place_name: suggestion.place_name,
                    google_maps_url: suggestion.map_url,
                    latitude: suggestion.latitude,
                    longitude: suggestion.longitude,
                    category: suggestion.category,
                    locality: suggestion.district, // Mapping District to Locality
                    cover_photo_url: suggestion.image_url,
                    status: 'Pending', // New items in bucket list usually start as Pending
                    created_at: new Date().toISOString()
                }]);

            if (insertError) throw insertError;

            // 3. REMOVE FROM PENDING TABLE AFTER SUCCESSFUL MOVE
            const { error: deleteError } = await supabaseClient
                .from('pending_approvals')
                .delete()
                .eq('id', suggestionId);

            if (deleteError) throw deleteError;
            triggerToast('Location Added to Bucket List');
        }

        // Refresh UI data
        refreshAllData();

    } catch (err) {
        console.error("Dashboard Action Error:", err);
        triggerToast('Action failed: ' + err.message);
    }
};

                            className="flex-1 py-1 bg-rose-50 text-rose-600 rounded-lg text-[8px] font-black uppercase border border-rose-100 hover:bg-rose-100"
                        >
                            Delete
                        </button>
                    </div>
                </div>
            );
        })
    )}
</div>
            </div>

            {/* 2. Active Trip Planner */}
            <div className="p-4 border-b border-slate-100 bg-indigo-50/30">
                <div className="flex justify-between items-end mb-3">
                    <div>
                        <div className="flex items-center gap-2">
                            <p className="text-[10px] font-black uppercase text-indigo-700">Active Plan ({selectedTrip.length})</p>
                            {selectedTrip.length > 0 && (
                                <button onClick={() => setManualHome(manualHome ? null : {lat: mapRef.current.getCenter().lat, lng: mapRef.current.getCenter().lng})} className="transition-all active:scale-90">
                                    {manualHome ? (
                                        <div className="flex items-center gap-1 bg-rose-100 px-1.5 py-0.5 rounded-full border border-rose-200">
                                            <span className="h-1.5 w-1.5 rounded-full bg-rose-500"></span>
                                            <span className="text-[7px] font-black text-rose-600 uppercase">Manual</span>
                                            <i data-lucide="mouse-pointer-click" className="w-2 h-2 text-rose-400 ml-0.5"></i>
                                        </div>
                                    ) : (
                                        <div className="flex items-center gap-1 bg-emerald-100 px-1.5 py-0.5 rounded-full border border-emerald-200">
                                            <span className="h-1.5 w-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                                            <span className="text-[7px] font-black text-emerald-600 uppercase">GPS</span>
                                        </div>
                                    )}
                                </button>
                            )}
                        </div>
                        <p className="text-[8px] font-bold uppercase text-slate-500 mt-1 tracking-tighter">
                            {selectedTrip.length > 0 ? `Est. Journey: ${calculateRouteDistance()} KM` : "Empty Plan"}
                        </p>
                    </div>
                    <div className="flex gap-2">
                        {selectedTrip.length > 0 && (
                            <button onClick={() => { setSelectedTrip([]); setFilteredPlaces(places); }} className="px-2 py-1.5 bg-slate-200 text-slate-600 rounded-lg text-[9px] font-black uppercase">Clear</button>
                        )}
                        <button onClick={handleSaveRoute} disabled={selectedTrip.length < 2} className="px-3 py-1.5 bg-indigo-600 text-white rounded-lg text-[9px] font-black uppercase disabled:opacity-50">Save Plan</button>
                    </div>
                </div>

                <div className="space-y-1.5 max-h-40 overflow-y-auto no-scrollbar">
                    {selectedTrip.map((t, idx) => (
                        <div key={`${t.id}-${idx}`} className="flex justify-between items-center p-2.5 bg-white rounded-xl border border-indigo-100 shadow-sm group">
                            <div className="flex flex-col truncate pr-2">
                                <span className="text-[9px] font-black uppercase truncate text-slate-800">
                                    {idx + 1}. {t.place_name || "Unknown Location"}
                                </span>
                                <span className="text-[7px] font-bold text-indigo-400 uppercase">{t.category || "Planned Stop"}</span>
                            </div>
                            <button onClick={() => setSelectedTrip(prev => prev.filter((_, i) => i !== idx))} className="p-1 text-slate-300 hover:text-rose-500">
                                <i data-lucide="trash-2" className="w-3 h-3"></i>
                            </button>
                        </div>
                    ))}
                </div>
            </div>

            {/* 3. Available Locations */}
            <div className="flex-1 flex flex-col min-h-0 bg-white">
                <div className="p-4 bg-white border-b border-slate-50">
                    <div className="relative">
                        <i data-lucide="search" className="absolute left-2.5 top-1/2 -translate-y-1/2 w-3 h-3 text-slate-400"></i>
                        <input 
                            type="text" 
                            placeholder="Search locations..." 
                            value={searchTerm} 
                            onChange={(e) => setSearchTerm(e.target.value)}
                            className="w-full pl-8 pr-3 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-[9px] font-bold uppercase outline-none focus:border-emerald-400"
                        />
                    </div>
                </div>
                <div className="flex-1 overflow-y-auto p-4 space-y-3 select-none">
                    {filteredPlaces.filter(p => !selectedTrip.find(t => t.id === p.id)).map(p => (
                        <div key={p.id} className="flex justify-between items-center p-2 hover:bg-slate-50 rounded-lg border border-transparent hover:border-slate-100 transition-colors group">
                            <div className="flex flex-col truncate pr-2">
                                <span className="text-[9px] font-black uppercase truncate text-slate-600 group-hover:text-slate-900">{p.place_name}</span>
                                <span className="text-[7px] font-bold uppercase text-slate-400">{p.category}</span>
                            </div>
                            <button onClick={() => { setSelectedTrip([...selectedTrip, p]); triggerToast(`Added ${p.place_name}`); }} className="text-emerald-500 hover:bg-emerald-50 p-1.5 rounded-lg transition-all active:scale-90">
                                <i data-lucide="plus-circle" className="w-3.5 h-3.5"></i>
                            </button>
                        </div>
                    ))}
                </div>
            </div>
        </aside>

        <section className="flex-1 relative bg-slate-100">
            <div id="map-container" className="w-full h-full"></div>
        </section>
    </div>
)}

                        {/* TAB 3: DASHBOARD */}
{activeTab === 'dashboard' && (
    <div className="h-full overflow-y-auto p-8 no-scrollbar bg-slate-50">
        
        {/* DASHBOARD HEADER WITH REFRESH BUTTON */}
        <div className="max-w-7xl mx-auto mb-8 flex justify-between items-center">
            <div>
                <h1 className="text-2xl font-black text-slate-900 italic uppercase tracking-tighter">System Overview</h1>
                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none">Real-time journal analytics</p>
            </div>
            
            <button 
                onClick={async (e) => {
                    const btn = e.currentTarget;
                    btn.classList.add('animate-spin'); 
                    await refreshAllData();
                    if (window.lucide) window.lucide.createIcons();
                    triggerToast("Data Synchronized");
                    setTimeout(() => btn.classList.remove('animate-spin'), 600);
                }}
                className="p-4 bg-white border border-slate-200 rounded-2xl shadow-sm hover:shadow-md transition-all group active:scale-95"
                title="Refresh Data"
            >
                <i data-lucide="refresh-cw" className="w-5 h-5 text-indigo-600 group-hover:rotate-180 transition-transform duration-500"></i>
            </button>
        </div>

        <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-6 pb-20">
            
            {/* 1. Page Visits Block (Updated to 3 Columns) */}
            <div className="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-xl relative overflow-hidden lg:col-span-2">
                <div className="absolute -top-20 -right-20 w-64 h-64 bg-indigo-500 rounded-full blur-3xl opacity-20"></div>
                <div className="flex justify-between items-end mb-8 relative z-10">
                    <div>
                        <p className="text-[10px] font-black uppercase text-indigo-400 mb-1">Total Visits</p>
                        <p className="text-5xl font-black italic">{dashboardStats.totalVisits}</p>
                    </div>
                    <i data-lucide="globe-2" className="w-8 h-8 text-slate-700"></i>
                </div>
                
                <div className="grid grid-cols-3 gap-6 relative z-10">
                    <div>
                        <p className="text-[9px] font-black uppercase text-slate-400 mb-3 border-b border-slate-700 pb-1">Countries</p>
                        <div className="space-y-2 max-h-32 overflow-y-auto no-scrollbar">
                            {Object.entries(dashboardStats.countryVisits).map(([c, count]) => (
                                <div key={c} className="flex justify-between text-[10px] font-bold text-slate-300">
                                    <span className="truncate pr-2">{c}</span>
                                    <span className="text-white">{count}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                    <div>
                        <p className="text-[9px] font-black uppercase text-slate-400 mb-3 border-b border-slate-700 pb-1">Cities</p>
                        <div className="space-y-2 max-h-32 overflow-y-auto no-scrollbar">
                            {Object.entries(dashboardStats.cityVisits).map(([c, count]) => (
                                <div key={c} className="flex justify-between text-[10px] font-bold text-slate-300">
                                    <span className="truncate pr-2">{c}</span>
                                    <span className="text-white">{count}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                    <div>
                        <p className="text-[9px] font-black uppercase text-slate-400 mb-3 border-b border-slate-700 pb-1">Devices</p>
                        <div className="space-y-2 max-h-32 overflow-y-auto no-scrollbar">
                            {Object.entries(dashboardStats.deviceVisits || {}).map(([d, count]) => (
                                <div key={d} className="flex justify-between text-[10px] font-bold text-slate-300">
                                    <span className="truncate pr-1" title={d}>{d}</span>
                                    <span className="text-white">{count}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            </div>

            {/* 2. Likes Metrics Block */}
            <div className="bg-gradient-to-br from-pink-500 to-rose-500 rounded-[2.5rem] p-8 text-white shadow-xl flex flex-col justify-between">
                <div className="flex justify-between items-start mb-6">
                    <div>
                        <p className="text-[10px] font-black uppercase text-pink-200 mb-1">Popular Locations</p>
                        <p className="text-4xl font-black italic">{dashboardStats.likesSummary.reduce((acc, curr) => acc + curr.hits, 0)} <span className="text-sm opacity-60">Likes</span></p>
                    </div>
                    <div className="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center"><i data-lucide="heart" className="w-5 h-5 fill-white text-white"></i></div>
                </div>
                <div className="grid grid-cols-1 gap-2 bg-black/10 p-4 rounded-2xl">
                    <p className="text-[8px] font-black uppercase text-pink-200 mb-1">Most Liked Locations</p>
                    <div className="max-h-32 overflow-y-auto no-scrollbar space-y-2">
                        {dashboardStats.likesSummary.slice(0, 5).map((item, i) => (
                            <div key={i} className="flex justify-between items-center border-b border-white/10 pb-1">
                                <p className="text-[10px] font-bold truncate pr-4">{item.name}</p>
                                <p className="text-[10px] font-black">{item.hits}</p>
                            </div>
                        ))}
                    </div>
                </div>
            </div>

            {/* 3. Pending Comments Block */}
            <div className="bg-white rounded-[2.5rem] p-8 border border-slate-100 shadow-sm flex flex-col max-h-[450px]">
                <div className="flex justify-between items-center mb-6">
                    <h2 className="text-[10px] font-black uppercase text-slate-800 flex items-center gap-2">
                        <i data-lucide="message-square" className="w-4 h-4"></i> Pending Comments
                    </h2>
                    <span className="px-3 py-1 bg-indigo-100 text-indigo-600 rounded-full text-[9px] font-bold">
                        {allComments.filter(c => !c.reply_text).length}
                    </span>
                </div>
                <div className="space-y-4 overflow-y-auto no-scrollbar flex-1 pr-2">
                    {allComments.filter(c => !c.reply_text).map(c => (
                        <div key={c.id} className="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                            <div className="flex justify-between items-start mb-2">
                                <p className="text-[9px] font-black uppercase text-indigo-500 truncate">{c.travel_bucket_list?.place_name || 'General'}</p>
                                <p className="text-[8px] font-bold text-slate-400 uppercase">{new Date(c.created_at).toLocaleDateString()}</p>
                            </div>
                            <p className="text-xs text-slate-700 font-medium italic mb-3">"{c.comment_text}"</p>
                            <div className="flex gap-2">
                                <input 
                                    id={`reply-input-${c.id}`}
                                    className="flex-1 bg-white border border-slate-200 rounded-lg px-3 py-2 text-[10px] outline-none focus:ring-1 focus:ring-indigo-400"
                                    placeholder="Type reply..."
                                />
                                <button 
                                    onClick={() => submitCommentReply(c.id, `reply-input-${c.id}`)} 
                                    className="px-4 bg-indigo-600 text-white rounded-lg text-[9px] font-black uppercase transition-all hover:bg-indigo-700"
                                >
                                    Reply
                                </button>
                            </div>
                        </div>
                    ))}
                    {allComments.filter(c => !c.reply_text).length === 0 && (
                        <p className="text-center text-slate-400 py-10 text-[10px] font-bold uppercase tracking-widest">All caught up!</p>
                    )}
                </div>
            </div>

            {/* 4. Suggestions / Pending Approvals */}
            <div className="bg-white rounded-[2.5rem] p-8 border border-slate-100 shadow-sm flex flex-col max-h-[450px]">
                <div className="flex justify-between items-center mb-6">
                    <h2 className="text-[10px] font-black uppercase text-orange-600 flex items-center gap-2">
                        <i data-lucide="shield-alert" className="w-4 h-4"></i> Suggestions
                    </h2>
                    <span className="px-3 py-1 bg-orange-100 text-orange-600 rounded-full text-[9px] font-bold">
                        {pendingApprovals.length}
                    </span>
                </div>
                <div className="space-y-3 overflow-y-auto no-scrollbar flex-1 pr-2">
                    {pendingApprovals.map(a => (
                        <div key={a.id} className="p-4 bg-orange-50/50 rounded-2xl border border-orange-100 flex justify-between items-center group">
                            <div>
                                <p className="text-[10px] font-black uppercase text-slate-800">{a.place_name}</p>
                                <p className="text-[8px] font-bold text-slate-500 mt-0.5">{a.category || 'Location'}</p>
                            </div>
                            <div className="flex gap-2">
                                <button 
                                    onClick={() => handleSuggestionAction(a.id, 'approved')} 
                                    className="px-3 py-1.5 bg-emerald-500 text-white rounded-lg text-[8px] font-black uppercase shadow-lg shadow-emerald-100 hover:scale-105 transition-transform"
                                >
                                    Approve
                                </button>
                                <button 
                                    onClick={() => handleSuggestionAction(a.id, 'rejected')} 
                                    className="px-3 py-1.5 bg-rose-100 text-rose-600 rounded-lg text-[8px] font-black uppercase hover:bg-rose-200"
                                >
                                    Dismiss
                                </button>
                            </div>
                        </div>
                    ))}
                    {pendingApprovals.length === 0 && (
                        <p className="text-center text-slate-400 py-10 text-[10px] font-bold uppercase tracking-widest">No pending audits</p>
                    )}
                </div>
            </div>
            
        </div>
    </div>
)}
                    </main>

                    {/* TOAST */}
                    {toast.show && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[5000] bg-slate-900 text-white px-8 py-3 rounded-2xl text-[10px] font-black uppercase shadow-2xl transition-all">
                            {toast.msg}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
